name: Build

on:
  push:
    branches: '**'
  pull_request:
    branches: '**'
  workflow_dispatch:

env:
  # Customize the CMake build type here (Release, Debug, RelWithDebInfo, etc.)
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=ON -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF


jobs:

  fetch_build_number:
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.fetch.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6
        with:
            fetch-depth: 1
      - id: fetch
        shell: bash
        run: |
          build_version="$("${{ github.workspace }}/scripts/mumble-version.py")"
          build_number="$("${{ github.workspace }}/scripts/mumble-build-number.py" \
            --commit "${{ github.sha }}" --version "${build_version}" \
            --password "${{ secrets.BUILD_NUMBER_TOKEN }}" --default 0)"
          echo "Build Number: ${build_version}.${build_number}"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"


  build:
    needs: [ fetch_build_number ]
    name: ${{ matrix.lane }}

    strategy:
        fail-fast: false
        matrix:
            include:
              - lane: windows-client-server
                os: windows-2025-vs2026
                type: static
                arch: x86_64
                build_client: ON
                build_server: ON
                enable_packaging: ON
                enable_overlay_xcompile: ON
                run_tests: OFF
                extra_cmake_options: "-Dtests=OFF"
              - lane: linux-server
                os: ubuntu-24.04
                type: static
                arch: x86_64
                build_client: OFF
                build_server: ON
                enable_packaging: OFF
                enable_overlay_xcompile: OFF
                run_tests: OFF
                extra_cmake_options: "-Dtests=OFF"
            
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6
      with:
          fetch-depth: 1

    - name: Initialize submodules with retry
      shell: bash
      run: bash "$GITHUB_WORKSPACE/.github/workflows/update_submodules_with_retry.sh"

    - name: Set environment variables
      run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}" "${{ github.workspace }}"
      shell: bash

    - name: Select CI build components
      shell: bash
      run: |
        set -euxo pipefail
        echo "MUMBLE_BUILD_CLIENT=${{ matrix.build_client }}" >> "$GITHUB_ENV"
        echo "MUMBLE_BUILD_SERVER=${{ matrix.build_server }}" >> "$GITHUB_ENV"
        echo "MUMBLE_ENABLE_WINDOWS_PACKAGING=${{ matrix.enable_packaging }}" >> "$GITHUB_ENV"
        echo "MUMBLE_ENABLE_WINDOWS_OVERLAY_XCOMPILE=${{ matrix.enable_overlay_xcompile }}" >> "$GITHUB_ENV"
        if [[ -n "${{ matrix.extra_cmake_options }}" ]]; then
          echo "CMAKE_OPTIONS=${CMAKE_OPTIONS} ${{ matrix.extra_cmake_options }}" >> "$GITHUB_ENV"
        fi

    - uses: actions/cache/restore@v5
      with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

    - uses: ./.github/actions/install-dependencies
      with:
          type: ${{ matrix.type }}
          os: ${{ matrix.os }}
          arch: ${{ matrix.arch }}

    - name: Install Rust toolchain for DeepFilterNet
      if: ${{ startsWith(matrix.os, 'windows') }}
      shell: powershell
      run: |
        $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
        Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
        & $rustupInit -y --profile minimal --default-toolchain stable
        if ($LASTEXITCODE -ne 0) {
          throw "rustup-init failed"
        }
        "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version

    - name: Download ONNX Runtime for DTLN
      if: ${{ startsWith(matrix.os, 'windows') }}
      shell: powershell
      run: |
        $version = "1.18.1"
        $archive = Join-Path $env:RUNNER_TEMP "onnxruntime-win-x64-$version.zip"
        $extractRoot = Join-Path $env:RUNNER_TEMP "onnxruntime"
        $onnxRoot = Join-Path $extractRoot "onnxruntime-win-x64-$version"
        Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip" -OutFile $archive
        if (Test-Path -LiteralPath $extractRoot) {
          Remove-Item -LiteralPath $extractRoot -Recurse -Force
        }
        Expand-Archive -LiteralPath $archive -DestinationPath $extractRoot -Force
        if (-not (Test-Path -LiteralPath (Join-Path $onnxRoot "include"))) {
          throw "Expanded ONNX Runtime archive is missing its include directory"
        }
        "ONNXRUNTIME_ROOT=$onnxRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install ffmpeg for helper runtime probe
      if: ${{ startsWith(matrix.os, 'windows') }}
      shell: powershell
      run: |
        choco install ffmpeg -y

        $ffmpeg = Get-Command ffmpeg.exe -ErrorAction SilentlyContinue
        if (-not $ffmpeg) {
          $ffmpeg = Get-ChildItem -Path "C:\ProgramData\chocolatey" -Recurse -File -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue |
            Sort-Object -Property FullName |
            Select-Object -First 1
        }
        if (-not $ffmpeg) {
          throw "Unable to locate ffmpeg.exe after Chocolatey installation."
        }

        $ffmpegPath = if ($ffmpeg -is [System.Management.Automation.CommandInfo]) { $ffmpeg.Source } else { $ffmpeg.FullName }
        $ffmpegBin = Split-Path -Parent $ffmpegPath
        $ffplayPath = Join-Path $ffmpegBin "ffplay.exe"
        if (-not (Test-Path -LiteralPath $ffplayPath)) {
          throw "Unable to locate ffplay.exe next to '$ffmpegPath'."
        }

        "MUMBLE_SCREENSHARE_FFMPEG_PATH=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "MUMBLE_SCREENSHARE_FFPLAY_PATH=$ffplayPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        $ffmpegBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

    - name: Build
      run: ./.github/workflows/build.sh "${{ matrix.os }}" "${{ matrix.type }}" "${{ matrix.arch }}"
      shell: bash
      env:
          MUMBLE_BUILD_NUMBER: ${{ needs.fetch_build_number.outputs.build_number }}

    - if: ${{ startsWith(matrix.os, 'windows') && matrix.type == 'static' }}
      name: Verify Windows Screen-Share Helper Runtime
      shell: bash
      run: |
        set -euxo pipefail
        export MUMBLE_SCREENSHARE_TEST_PATTERN=1
        export MUMBLE_SCREENSHARE_CAPTURE_SOURCE=test-pattern
        export MUMBLE_SCREENSHARE_HEADLESS_VIEW=1
        ffmpeg -version
        helper_path="$(find build -iname 'mumble-screen-helper.exe' | head -n1)"
        test -n "$helper_path"
        "$helper_path" --diagnostics-log-file build/windows-screen-share-helper.log --print-capabilities-json > build/windows-screen-share-capabilities.json
        test -s build/windows-screen-share-capabilities.json
        python - <<'PY'
        import json
        from pathlib import Path

        capabilities_envelope = json.loads(Path("build/windows-screen-share-capabilities.json").read_text(encoding="utf-8"))
        capabilities = capabilities_envelope.get("payload", capabilities_envelope)
        runtime_support = capabilities.get("runtime_support", capabilities)

        if not runtime_support.get("ffmpeg_available"):
            raise SystemExit("Helper runtime probe reports ffmpeg_available=false.")
        if not capabilities.get("capture_supported"):
            raise SystemExit("Helper runtime probe reports capture_supported=false.")
        if not runtime_support.get("browser_webrtc_available"):
            raise SystemExit("Helper runtime probe reports browser_webrtc_available=false.")
        if not any(runtime_support.get(key) for key in ("edge_available", "chrome_available", "firefox_available")):
            raise SystemExit("Helper runtime probe found no supported browser on this machine.")
        if not any(runtime_support.get(key) for key in ("h264_mf_available", "h264_qsv_available", "libx264_available")):
            raise SystemExit("Helper runtime probe found no usable H.264 encoder.")
        PY
        "$helper_path" --diagnostics-log-file build/windows-screen-share-helper.log --self-test > build/windows-screen-share-self-test.json
        test -s build/windows-screen-share-self-test.json
        python - <<'PY'
        import json
        from pathlib import Path

        self_test_envelope = json.loads(Path("build/windows-screen-share-self-test.json").read_text(encoding="utf-8"))
        self_test = self_test_envelope.get("payload", self_test_envelope)
        self_test_succeeded = bool(
            self_test_envelope.get(
                "ok",
                self_test_envelope.get("success", self_test.get("success", False)),
            )
        )

        if not self_test_succeeded:
            raise SystemExit("Helper self-test reported success=false.")
        if not self_test.get("output_file"):
            raise SystemExit("Helper self-test did not report an output_file.")
        PY

    - if: ${{ startsWith(matrix.os, 'windows') && matrix.type == 'static' }}
      name: Validate Windows Client/Server Binary Set
      shell: powershell
      run: |
        .\scripts\windows\assert-windows-build-artifacts.ps1 `
          -BuildRoot .\build `
          -RequireClient `
          -RequireServer `
          -RequireScreenHelper `
          -RequireSpeechCleanup `
          -ArtifactListPath .\build\windows-binary-artifacts.txt

    - if: ${{ startsWith(matrix.os, 'windows') && matrix.type == 'static' }}
      name: Validate Windows Installers
      shell: powershell
      run: |
        .\scripts\windows\assert-windows-build-artifacts.ps1 `
          -BuildRoot .\build `
          -RequireClientInstaller `
          -RequireServerInstaller `
          -ArtifactListPath .\build\windows-installer-artifacts.txt

    - if: ${{ startsWith(matrix.os, 'ubuntu') && matrix.type == 'static' }}
      name: Validate Linux Server Binary Set
      shell: bash
      run: |
        set -euxo pipefail
        test -x build/mumble-server
        test ! -e build/mumble

    - if: ${{ matrix.run_tests != 'OFF' }}
      name: Test
      working-directory: ${{ github.workspace }}/build
      shell: bash
      run: ctest --output-on-failure -C $BUILD_TYPE

    - if: ${{ github.event_name != 'pull_request' && startsWith(matrix.os, 'windows') }}
      name: Publish Windows Client/Server Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: 'Mumble-windows-client-server'
        compression-level: 9
        path: |
          build/mumble.exe
          build/mumble-server.exe
          build/mumble-screen-helper.exe
          build/mumble-g15-helper.exe
          build/mumble_ol*.dll
          build/mumble_ol_helper*.exe
          build/windows-binary-artifacts.txt
          build/windows-installer-artifacts.txt
          build/windows-screen-share-capabilities.json
          build/windows-screen-share-helper.log
          build/windows-screen-share-self-test.json
          build/speexdsp.dll
          build/rnnoise.dll
          build/deepfilter.dll
          build/onnxruntime.dll
          build/licenses/**
          build/plugins/**
          build/dtln/**
          build/rnnoise/**
          build/deepfilternet/**
          build/**/mumble*.msi
          build/**/mumble*.exe
          build/**/mumble*.dll

    - if: ${{ github.event_name != 'pull_request' && startsWith(matrix.os, 'ubuntu') }}
      name: Publish Linux Server Artifacts
      uses: actions/upload-artifact@v6
      with:
        name: 'Mumble-linux-server'
        compression-level: 9
        path: |
          build/mumble-server

      # We don't want to save the build env in a cache on a PR as caches are scoped
      # to branches and while PRs can access caches from the default branch, they
      # can't access the cache of other PRs. Hence, it is kind of a waste to save
      # the cache on a PR
    - if: ${{ (matrix.type == 'static' || matrix.type == 'shared') && github.event_name != 'pull_request' }}
      uses: actions/cache/save@v5
      with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}
