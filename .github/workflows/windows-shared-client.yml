name: Windows Shared Client Installer

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=OFF -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF
  MUMBLE_ENABLE_WINDOWS_PACKAGING: ON
  MUMBLE_ENABLE_WINDOWS_OVERLAY_XCOMPILE: ON
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE: 2025-11
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE_TAG: build-env-2025-11
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT: 127cccc01d
  ONNXRUNTIME_VERSION: 1.18.1

jobs:
  fetch_build_number:
    name: fetch-build-number
    runs-on: ubuntu-latest
    outputs:
      build_number: ${{ steps.fetch.outputs.build_number }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1
      - id: fetch
        shell: bash
        run: |
          build_version="$("${{ github.workspace }}/scripts/mumble-version.py")"
          build_number="$("${{ github.workspace }}/scripts/mumble-build-number.py" \
            --commit "${{ github.sha }}" --version "${build_version}" \
            --password "${{ secrets.BUILD_NUMBER_TOKEN }}" --default 0)"
          echo "Build Number: ${build_version}.${build_number}"
          echo "build_number=${build_number}" >> "$GITHUB_OUTPUT"

  build-windows-client-shared:
    name: windows-shared-client-installer
    needs: [ fetch_build_number ]
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Initialize submodules with retry
        shell: bash
        run: bash "$GITHUB_WORKSPACE/.github/workflows/update_submodules_with_retry.sh"

      - name: Pin shared environment and enable bootstrap fallback
        shell: bash
        run: |
          echo "MUMBLE_ENVIRONMENT_SOURCE_OVERRIDE=https://github.com/${{ github.repository }}/releases/download/${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "MUMBLE_ENVIRONMENT_COMMIT_OVERRIDE=${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT}" >> "$GITHUB_ENV"
          echo "MUMBLE_ENVIRONMENT_DIR_OVERRIDE=$GITHUB_WORKSPACE/build_env/${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE}-${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT}-shared" >> "$GITHUB_ENV"
          echo "MUMBLE_ALLOW_ENVIRONMENT_BOOTSTRAP=ON" >> "$GITHUB_ENV"

      - name: Set environment variables
        run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "windows-2022" "shared" "x86_64" "${{ github.workspace }}"
        shell: bash

      - id: restore-shared-build-env-cache
        uses: actions/cache/restore@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - name: Verify shared environment archive or use local bootstrap fallback
        shell: bash
        run: |
          set -euxo pipefail
          archive_url="${MUMBLE_ENVIRONMENT_SOURCE}/${MUMBLE_ENVIRONMENT_VERSION}.7z"
          split_archive_url="${archive_url}.001"
          if ! curl -I -f -L "$archive_url" > /dev/null && ! curl -I -f -L "$split_archive_url" > /dev/null; then
            echo "::notice title=Missing shared build environment::The shared Windows vcpkg environment archive is not published: $archive_url"
            echo "::notice title=Shared bootstrap fallback::Falling back to local vcpkg bootstrap for the shared Windows environment."
          fi

      - id: setup-windows-optional-runtimes
        uses: ./.github/actions/setup-windows-optional-runtimes
        with:
          onnxruntime-version: ${{ env.ONNXRUNTIME_VERSION }}
          install-rust: 'true'
          install-ffmpeg: ${{ github.event_name != 'pull_request' }}

      - name: Build, package, and stage shared WebEngine client
        shell: powershell
        run: |
          $isPullRequest = '${{ github.event_name }}' -eq 'pull_request'
          $additionalCMakeOptions = @('-Dserver=OFF')
          if ($isPullRequest) {
            $additionalCMakeOptions += '-Dlto=OFF'
          }

          $arguments = @{
            BuildNumber = "${{ needs.fetch_build_number.outputs.build_number }}"
            EnvironmentRelease = "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE }}"
            EnvironmentCommit = "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT }}"
            SharedWebEngine = $true
            AdditionalCMakeOptions = $additionalCMakeOptions
            EnablePackaging = $true
            UseBundledCli11 = $true
            SkipSharedInstaller = $isPullRequest
            AllowPendingReboot = $true
          }
          if ('${{ steps.restore-shared-build-env-cache.outputs.cache-hit }}' -ne 'true') {
            $arguments.InstallDependencies = $true
          }
          .\scripts\windows\build-local-windows-client.ps1 @arguments

      - name: Validate shared Windows client binaries
        shell: powershell
        run: |
          .\scripts\windows\assert-windows-build-artifacts.ps1 `
            -BuildRoot .\build-shared-webengine `
            -StageRoot .\build-shared-webengine\shared-webengine-stage `
            -RequireStage `
            -RequireClient `
            -RequireScreenHelper `
            -RequireSpeechCleanup `
            -ArtifactListPath .\build-shared-webengine\windows-binary-artifacts.txt

      - name: Verify shared helper runtime
        if: ${{ github.event_name != 'pull_request' }}
        shell: powershell
        run: |
          .\scripts\windows\build-local-windows-client.ps1 `
            -BuildNumber "${{ needs.fetch_build_number.outputs.build_number }}" `
            -EnvironmentRelease "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE }}" `
            -EnvironmentCommit "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT }}" `
            -SharedWebEngine `
            -SkipConfigure `
            -SkipBuild `
            -VerifyHelperRuntime `
            -AllowPendingReboot

      - name: Publish Shared Client Artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Mumble-windows-shared-client-installer-${{ needs.fetch_build_number.outputs.build_number }}
          compression-level: 0
          path: |
            build-shared-webengine/shared-webengine-stage/**
            build-shared-webengine/windows-screen-share-capabilities.json
            build-shared-webengine/windows-screen-share-helper.log
            build-shared-webengine/windows-screen-share-self-test.json
            build-shared-webengine/windows-binary-artifacts.txt
            build-shared-webengine/windows-client-artifacts.txt
            build-shared-webengine/**/mumble*.msi
            build-shared-webengine/**/mumble*.exe

      - if: ${{ github.event_name != 'pull_request' && steps.restore-shared-build-env-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - if: ${{ github.event_name != 'pull_request' && steps.setup-windows-optional-runtimes.outputs.onnxruntime-cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .cache/onnxruntime/win-x64-${{ env.ONNXRUNTIME_VERSION }}
          key: onnxruntime-${{ runner.os }}-x64-${{ env.ONNXRUNTIME_VERSION }}
