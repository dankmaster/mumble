name: Windows Client

on:
  workflow_dispatch:

env:
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=OFF -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF

jobs:
  build-windows-client:
    runs-on: windows-2025-vs2026

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set environment variables
        run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "windows-2025-vs2026" "static" "x86_64" "${{ github.workspace }}"
        shell: bash

      - uses: actions/cache@v5
        with:
          path: ${{ env.MUMBLE_ENVIRONMENT_DIR }}
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - uses: ./.github/actions/install-dependencies
        with:
          type: static
          os: windows-2025-vs2026
          arch: x86_64

      - name: Build
        run: ./.github/workflows/build.sh "windows-2025-vs2026" "static" "x86_64"
        shell: bash
        env:
          MUMBLE_BUILD_NUMBER: ${{ github.run_number }}

      - name: Publish
        uses: actions/upload-artifact@v6
        with:
          name: Mumble-windows-client-${{ github.ref_name }}-${{ github.run_number }}
          compression-level: 9
          path: |
            build/mumble
            build/**/mumble*.msi
            build/**/mumble*.exe
