name: mumble-forked MSI Release

on:
  workflow_dispatch:
    inputs:
      update_announcement:
        description: Short message shown in the in-app update popup
        required: true
        type: string
      release_notes:
        description: Optional extra details shown on GitHub and in the updater details pane
        required: false
        type: string

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=OFF -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF
  MUMBLE_FORKED_RELEASE_TAG: mumble-forked
  MUMBLE_FORKED_RELEASE_TITLE: mumble-forked
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE: 2025-11
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE_TAG: build-env-2025-11
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT: 127cccc01d
  ONNXRUNTIME_VERSION: 1.18.1
  PROTECTED_BUILD_ENV_RELEASE_TAG: build-env-2025-11

jobs:
  build-and-publish-msi:
    name: build-and-publish-msi
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize submodules with retry
        shell: bash
        run: bash "$GITHUB_WORKSPACE/.github/workflows/update_submodules_with_retry.sh"

      - name: Pin shared environment and enable bootstrap fallback
        shell: bash
        run: |
          echo "MUMBLE_ENVIRONMENT_SOURCE_OVERRIDE=https://github.com/${{ github.repository }}/releases/download/${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "MUMBLE_ENVIRONMENT_COMMIT_OVERRIDE=${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT}" >> "$GITHUB_ENV"
          echo "MUMBLE_ENVIRONMENT_DIR_OVERRIDE=$GITHUB_WORKSPACE/build_env/${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE}-${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT}-shared" >> "$GITHUB_ENV"
          echo "MUMBLE_ALLOW_ENVIRONMENT_BOOTSTRAP=ON" >> "$GITHUB_ENV"

      - name: Set environment variables
        shell: bash
        run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "windows-2022" "shared" "x86_64" "${{ github.workspace }}"

      - name: Verify shared environment archive or use local bootstrap fallback
        shell: bash
        run: |
          set -euxo pipefail
          archive_url="${MUMBLE_ENVIRONMENT_SOURCE}/${MUMBLE_ENVIRONMENT_VERSION}.7z"
          split_archive_url="${archive_url}.001"
          if ! curl -I -f -L "$archive_url" > /dev/null && ! curl -I -f -L "$split_archive_url" > /dev/null; then
            echo "::notice title=Missing shared build environment::The shared Windows vcpkg environment archive is not published: $archive_url"
            echo "::notice title=Shared bootstrap fallback::Falling back to local vcpkg bootstrap for the shared Windows environment."
          fi

      - id: restore-shared-build-env-cache
        uses: actions/cache/restore@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - id: setup-windows-optional-runtimes
        uses: ./.github/actions/setup-windows-optional-runtimes
        with:
          onnxruntime-version: ${{ env.ONNXRUNTIME_VERSION }}
          install-rust: 'true'
          install-ffmpeg: 'false'

      - name: Install Windows installer tooling
        uses: ./.github/actions/setup-windows-installer-tooling
        with:
          wixsharp-version: '1.19.0.0'

      - name: Build Windows client MSI
        shell: powershell
        run: |
          $arguments = @{
            BuildNumber = "${{ github.run_number }}"
            EnvironmentRelease = "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE }}"
            EnvironmentCommit = "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT }}"
            SharedWebEngine = $true
            AdditionalCMakeOptions = @('-Dserver=OFF')
            EnablePackaging = $true
            UseBundledCli11 = $true
            AllowPendingReboot = $true
          }
          if ('${{ steps.restore-shared-build-env-cache.outputs.cache-hit }}' -ne 'true') {
            $arguments.InstallDependencies = $true
          }
          .\scripts\windows\build-local-windows-client.ps1 @arguments

      - name: Validate mumble-forked MSI artifacts
        shell: powershell
        run: |
          .\scripts\windows\assert-windows-build-artifacts.ps1 `
            -BuildRoot .\build-shared-webengine `
            -StageRoot .\build-shared-webengine\shared-webengine-stage `
            -RequireStage `
            -RequireClient `
            -RequireScreenHelper `
            -RequireSpeechCleanup `
            -RequireClientInstaller `
            -ArtifactListPath .\build-shared-webengine\mumble-forked-artifacts.txt

      - name: Prepare release assets
        id: prepare-assets
        shell: powershell
        env:
          MUMBLE_FORKED_UPDATE_ANNOUNCEMENT: ${{ inputs.update_announcement }}
          MUMBLE_FORKED_RELEASE_NOTES: ${{ inputs.release_notes }}
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = Join-Path $PWD "build-shared-webengine\mumble-forked-release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $announcement = ([string]$env:MUMBLE_FORKED_UPDATE_ANNOUNCEMENT).Trim()
          if ([string]::IsNullOrWhiteSpace($announcement)) {
            throw "The mumble-forked update announcement is required. Re-run the workflow with a short user-facing update message."
          }
          $releaseNotes = ([string]$env:MUMBLE_FORKED_RELEASE_NOTES).Trim()

          function Get-PreviousForkedReleaseCommit {
            param(
              [Parameter(Mandatory = $true)]
              [string]$Tag
            )

            $remoteRows = @(git ls-remote origin "refs/tags/${Tag}" "refs/tags/${Tag}^{}" 2>$null)
            if ($LASTEXITCODE -ne 0 -or $remoteRows.Count -eq 0) {
              return ""
            }

            git fetch --force --no-tags origin "refs/tags/${Tag}:refs/tags/${Tag}" 2>$null
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Unable to fetch previous '$Tag' tag locally; changelog will start from this build."
              return ""
            }

            $commit = (git rev-list -n 1 $Tag 2>$null)
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Unable to resolve previous '$Tag' tag commit; changelog will start from this build."
              return ""
            }

            return ([string]$commit).Trim()
          }

          function New-AutomatedChangelog {
            param(
              [string]$PreviousCommit,
              [Parameter(Mandatory = $true)]
              [string]$CurrentCommit,
              [Parameter(Mandatory = $true)]
              [string]$Repository
            )

            if (-not [string]::IsNullOrWhiteSpace($PreviousCommit)) {
              git cat-file -e "$PreviousCommit^{commit}" 2>$null
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "Previous mumble-forked commit '$PreviousCommit' is not available locally; changelog will start from this build."
                $PreviousCommit = ""
              }
            }

            $currentShort = $CurrentCommit.Substring(0, 12)
            $lines = New-Object System.Collections.Generic.List[string]
            $lines.Add("## Changelog")
            $lines.Add("")

            if ([string]::IsNullOrWhiteSpace($PreviousCommit)) {
              $lines.Add("No previous mumble-forked MSI tag was found, so this build starts the automated changelog history.")
              $logArgs = @("--first-parent", "--max-count=25", "--reverse", "--format=%h%x09%s", $CurrentCommit, "--")
            } elseif ($PreviousCommit -eq $CurrentCommit) {
              $previousShort = $PreviousCommit.Substring(0, 12)
              $lines.Add("No source changes since the previous mumble-forked MSI (``$previousShort``).")
              $logArgs = @()
            } else {
              $previousShort = $PreviousCommit.Substring(0, 12)
              $lines.Add("Changes from ``$previousShort`` to ``$currentShort``.")
              $lines.Add("")
              $lines.Add("[Full comparison](https://github.com/$Repository/compare/$PreviousCommit...$CurrentCommit)")
              $logArgs = @("--first-parent", "--reverse", "--format=%h%x09%s", "$PreviousCommit..$CurrentCommit", "--")
            }

            if ($logArgs.Count -gt 0) {
              $rawEntries = @(git log @logArgs)
              if ($LASTEXITCODE -ne 0) {
                throw "Failed to generate automated mumble-forked changelog."
              }

              if ($rawEntries.Count -gt 0) {
                $lines.Add("")
                foreach ($entry in $rawEntries) {
                  $parts = ([string]$entry) -split "`t", 2
                  if ($parts.Count -eq 2) {
                    $lines.Add("- $($parts[0]) $($parts[1])")
                  }
                }
              } elseif (-not [string]::IsNullOrWhiteSpace($PreviousCommit) -and $PreviousCommit -ne $CurrentCommit) {
                $lines.Add("")
                $lines.Add("- No first-parent commits were found in this range.")
              }
            }

            return ($lines -join "`n").Trim()
          }

          $clientMsi = Get-ChildItem -Path ".\build-shared-webengine" -Recurse -File -Filter "*client*.msi" |
            Sort-Object -Property LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $clientMsi) {
            throw "Unable to locate a shared client MSI under build-shared-webengine."
          }

          $assetName = "mumble-forked.msi"
          $assetPath = Join-Path $releaseDir $assetName
          Copy-Item -LiteralPath $clientMsi.FullName -Destination $assetPath -Force

          $hash = Get-FileHash -LiteralPath $assetPath -Algorithm SHA256
          $hashPath = "$assetPath.sha256"
          Set-Content -LiteralPath $hashPath -Value "$($hash.Hash)  $assetName"

          $notesPath = Join-Path $releaseDir "release-notes.md"
          $changelogPath = Join-Path $releaseDir "changelog.md"
          $manifestPath = Join-Path $releaseDir "mumble-forked-update.json"
          $previewPath = Join-Path $releaseDir "update-announcement-preview.txt"
          $buildNumber = "${{ github.run_number }}"
          $projectVersion = "1.7.$buildNumber"
          $currentCommit = "${{ github.sha }}"
          $shortSha = $currentCommit.Substring(0, 12)
          $releaseUrl = "https://github.com/${{ github.repository }}/releases/tag/${{ env.MUMBLE_FORKED_RELEASE_TAG }}"
          $installerUrl = "https://github.com/${{ github.repository }}/releases/download/${{ env.MUMBLE_FORKED_RELEASE_TAG }}/$assetName"
          $previousCommit = Get-PreviousForkedReleaseCommit -Tag "${{ env.MUMBLE_FORKED_RELEASE_TAG }}"
          $changelog = New-AutomatedChangelog -PreviousCommit $previousCommit -CurrentCommit $currentCommit -Repository "${{ github.repository }}"
          [System.IO.File]::WriteAllText($changelogPath, "$changelog`n", [System.Text.UTF8Encoding]::new($false))

          $manifest = [ordered]@{
            name = "mumble-forked"
            version = $projectVersion
            build = [int]$buildNumber
            commit = $currentCommit
            previousCommit = $previousCommit
            branch = "${{ github.ref_name }}"
            announcement = $announcement
            releaseNotes = $releaseNotes
            changelog = $changelog
            releaseUrl = $releaseUrl
            installerUrl = $installerUrl
            sha256 = $hash.Hash
            publishedAt = (Get-Date).ToUniversalTime().ToString("o")
          }
          $manifestJson = $manifest | ConvertTo-Json -Depth 4
          [System.IO.File]::WriteAllText($manifestPath, $manifestJson, [System.Text.UTF8Encoding]::new($false))

          $notesLines = New-Object System.Collections.Generic.List[string]
          $notesLines.Add("# mumble-forked")
          $notesLines.Add("")
          $notesLines.Add($announcement)
          if (-not [string]::IsNullOrWhiteSpace($releaseNotes)) {
            $notesLines.Add("")
            $notesLines.Add("## Release notes")
            $notesLines.Add("")
            $notesLines.Add($releaseNotes)
          }
          if (-not [string]::IsNullOrWhiteSpace($changelog)) {
            $notesLines.Add("")
            $notesLines.Add($changelog)
          }
          $notesLines.Add("")
          $notesLines.Add("- Announcement: $announcement")
          $notesLines.Add("- Version: $projectVersion")
          $notesLines.Add("- Build: $buildNumber")
          $notesLines.Add("- Commit: $currentCommit")
          if (-not [string]::IsNullOrWhiteSpace($previousCommit)) {
            $notesLines.Add("- Previous mumble-forked commit: $previousCommit")
          }
          $notesLines.Add("- Branch/ref: ${{ github.ref_name }}")
          $notesLines.Add("- Installer: $assetName")
          $notesLines.Add("- SHA256: $($hash.Hash)")
          $notesLines.Add("")
          $notesLines.Add("Windows may show a SmartScreen warning because this is not an official signed public release.")
          [System.IO.File]::WriteAllLines($notesPath, $notesLines, [System.Text.UTF8Encoding]::new($false))

          $previewLines = @(
            "Mumble update available",
            "",
            "A new mumble-forked build is available.",
            $announcement,
            "",
            "Current clients below build $buildNumber will see:",
            "Latest: $projectVersion, build $buildNumber",
            "Details: automated changelog from the previous mumble-forked MSI",
            "Download: $installerUrl"
          )
          [System.IO.File]::WriteAllLines($previewPath, $previewLines, [System.Text.UTF8Encoding]::new($false))
          Write-Host "Updater announcement preview:"
          Get-Content -LiteralPath $previewPath | ForEach-Object { Write-Host $_ }

          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
          "hash_path=$hashPath" >> $env:GITHUB_OUTPUT
          "changelog_path=$changelogPath" >> $env:GITHUB_OUTPUT
          "manifest_path=$manifestPath" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "preview_path=$previewPath" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT

      - name: Replace mumble-forked release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $tag = $env:MUMBLE_FORKED_RELEASE_TAG
          $protectedTag = $env:PROTECTED_BUILD_ENV_RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "MUMBLE_FORKED_RELEASE_TAG is empty."
          }
          if ($tag -eq $protectedTag -or $tag -like "build-env-*") {
            throw "Refusing to publish mumble-forked over protected build environment tag '$protectedTag'."
          }

          $currentMaster = git ls-remote origin "refs/heads/master"
          $currentMasterSha = if ($currentMaster) { ($currentMaster -split "\s+")[0] } else { "" }
          if (-not [string]::IsNullOrWhiteSpace($currentMasterSha) -and $currentMasterSha -ne $env:GITHUB_SHA) {
            Write-Warning "Skipping mumble-forked release publish because this run is no longer current master. Run SHA: $env:GITHUB_SHA; master SHA: $currentMasterSha."
            exit 0
          }

          $releaseRows = gh release list --repo $env:GITHUB_REPOSITORY --limit 100 --json tagName | ConvertFrom-Json
          foreach ($releaseRow in $releaseRows) {
            $releaseTag = [string]$releaseRow.tagName
            if ($releaseTag -eq $protectedTag -or $releaseTag -like "build-env-*") {
              Write-Host "Preserving protected release '$releaseTag'."
              continue
            }
            if ($releaseTag -eq $tag -or $releaseTag -like "$tag-*") {
              Write-Host "Deleting previous mumble-forked release '$releaseTag'."
              gh release delete $releaseTag --repo $env:GITHUB_REPOSITORY --yes
            }
          }

          git tag -f $tag $env:GITHUB_SHA
          git push origin "refs/tags/$tag" --force

          gh release create $tag `
            "${{ steps.prepare-assets.outputs.asset_path }}" `
            "${{ steps.prepare-assets.outputs.hash_path }}" `
            "${{ steps.prepare-assets.outputs.changelog_path }}" `
            "${{ steps.prepare-assets.outputs.manifest_path }}" `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --title $env:MUMBLE_FORKED_RELEASE_TITLE `
            --notes-file "${{ steps.prepare-assets.outputs.notes_path }}"

      - name: Publish mumble-forked MSI workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: mumble-forked-msi
          compression-level: 0
          path: |
            build-shared-webengine/mumble-forked-release/mumble-forked.msi
            build-shared-webengine/mumble-forked-release/mumble-forked.msi.sha256
            build-shared-webengine/mumble-forked-release/changelog.md
            build-shared-webengine/mumble-forked-release/mumble-forked-update.json
            build-shared-webengine/mumble-forked-release/release-notes.md
            build-shared-webengine/mumble-forked-release/update-announcement-preview.txt
            build-shared-webengine/mumble-forked-artifacts.txt

      - if: ${{ steps.restore-shared-build-env-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - if: ${{ steps.setup-windows-optional-runtimes.outputs.onnxruntime-cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .cache/onnxruntime/win-x64-${{ env.ONNXRUNTIME_VERSION }}
          key: onnxruntime-${{ runner.os }}-x64-${{ env.ONNXRUNTIME_VERSION }}
