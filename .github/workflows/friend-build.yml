name: Friend MSI Release

on:
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  BUILD_TYPE: Release
  CMAKE_OPTIONS: -Dtests=OFF -Dsymbols=ON -Ddisplay-install-paths=ON -Dtest-lto=OFF
  FRIEND_RELEASE_TAG: friend-build
  FRIEND_RELEASE_TITLE: Mumble Friend Build
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE: 2025-11
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE_TAG: build-env-2025-11
  MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT: 127cccc01d
  ONNXRUNTIME_VERSION: 1.18.1
  PROTECTED_BUILD_ENV_RELEASE_TAG: build-env-2025-11

jobs:
  build-and-publish-msi:
    name: build-and-publish-msi
    if: ${{ github.ref == 'refs/heads/master' }}
    runs-on: windows-2022

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Initialize submodules with retry
        shell: bash
        run: bash "$GITHUB_WORKSPACE/.github/workflows/update_submodules_with_retry.sh"

      - name: Pin shared environment and enable bootstrap fallback
        shell: bash
        run: |
          echo "MUMBLE_ENVIRONMENT_SOURCE_OVERRIDE=https://github.com/${{ github.repository }}/releases/download/${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE_TAG}" >> "$GITHUB_ENV"
          echo "MUMBLE_ENVIRONMENT_COMMIT_OVERRIDE=${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT}" >> "$GITHUB_ENV"
          echo "MUMBLE_ENVIRONMENT_DIR_OVERRIDE=$GITHUB_WORKSPACE/build_env/${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE}-${MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT}-shared" >> "$GITHUB_ENV"
          echo "MUMBLE_ALLOW_ENVIRONMENT_BOOTSTRAP=ON" >> "$GITHUB_ENV"

      - name: Set environment variables
        shell: bash
        run: $GITHUB_WORKSPACE/.github/workflows/set_environment_variables.sh "windows-2022" "shared" "x86_64" "${{ github.workspace }}"

      - name: Verify shared environment archive or use local bootstrap fallback
        shell: bash
        run: |
          set -euxo pipefail
          archive_url="${MUMBLE_ENVIRONMENT_SOURCE}/${MUMBLE_ENVIRONMENT_VERSION}.7z"
          split_archive_url="${archive_url}.001"
          if ! curl -I -f -L "$archive_url" > /dev/null && ! curl -I -f -L "$split_archive_url" > /dev/null; then
            echo "::notice title=Missing shared build environment::The shared Windows vcpkg environment archive is not published: $archive_url"
            echo "::notice title=Shared bootstrap fallback::Falling back to local vcpkg bootstrap for the shared Windows environment."
          fi

      - id: restore-shared-build-env-cache
        uses: actions/cache/restore@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - id: setup-windows-optional-runtimes
        uses: ./.github/actions/setup-windows-optional-runtimes
        with:
          onnxruntime-version: ${{ env.ONNXRUNTIME_VERSION }}
          install-rust: 'true'
          install-ffmpeg: 'false'

      - name: Install Windows installer tooling
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $archive = Join-Path $env:RUNNER_TEMP "WixSharp.7z"
          $installRoot = "C:\WixSharp"
          Invoke-WebRequest `
            -Uri "https://github.com/oleg-shilo/wixsharp/releases/download/v1.19.0.0/WixSharp.1.19.0.0.7z" `
            -OutFile $archive
          if (Test-Path -LiteralPath $installRoot) {
            Remove-Item -LiteralPath $installRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $installRoot | Out-Null
          tar -xf $archive -C $installRoot

          $wixBin = Join-Path $installRoot "Wix_bin\bin"
          if (-not (Test-Path -LiteralPath (Join-Path $installRoot "cscs.exe"))) {
            throw "WixSharp cscs.exe was not extracted under '$installRoot'."
          }
          if (-not (Test-Path -LiteralPath (Join-Path $wixBin "candle.exe")) -or `
              -not (Test-Path -LiteralPath (Join-Path $wixBin "light.exe"))) {
            throw "WiX candle.exe/light.exe were not extracted under '$wixBin'."
          }

          $installRoot >> $env:GITHUB_PATH
          $wixBin >> $env:GITHUB_PATH
          "WIXSHARP_WIXDIR=$wixBin" >> $env:GITHUB_ENV

      - name: Build Windows client MSI
        shell: powershell
        run: |
          $arguments = @{
            BuildNumber = "0"
            EnvironmentRelease = "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_RELEASE }}"
            EnvironmentCommit = "${{ env.MUMBLE_SHARED_WINDOWS_ENVIRONMENT_COMMIT }}"
            SharedWebEngine = $true
            AdditionalCMakeOptions = @('-Dserver=OFF')
            EnablePackaging = $true
            UseBundledCli11 = $true
            AllowPendingReboot = $true
          }
          if ('${{ steps.restore-shared-build-env-cache.outputs.cache-hit }}' -ne 'true') {
            $arguments.InstallDependencies = $true
          }
          .\scripts\windows\build-local-windows-client.ps1 @arguments

      - name: Validate friend MSI artifacts
        shell: powershell
        run: |
          .\scripts\windows\assert-windows-build-artifacts.ps1 `
            -BuildRoot .\build-shared-webengine `
            -StageRoot .\build-shared-webengine\shared-webengine-stage `
            -RequireStage `
            -RequireClient `
            -RequireScreenHelper `
            -RequireSpeechCleanup `
            -RequireClientInstaller `
            -ArtifactListPath .\build-shared-webengine\friend-msi-artifacts.txt

      - name: Prepare release assets
        id: prepare-assets
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $releaseDir = Join-Path $PWD "build-shared-webengine\friend-release"
          New-Item -ItemType Directory -Force -Path $releaseDir | Out-Null

          $clientMsi = Get-ChildItem -Path ".\build-shared-webengine" -Recurse -File -Filter "*client*.msi" |
            Sort-Object -Property LastWriteTimeUtc -Descending |
            Select-Object -First 1
          if (-not $clientMsi) {
            throw "Unable to locate a shared client MSI under build-shared-webengine."
          }

          $assetPath = Join-Path $releaseDir "Mumble-Friend-Build.msi"
          Copy-Item -LiteralPath $clientMsi.FullName -Destination $assetPath -Force

          $hash = Get-FileHash -LiteralPath $assetPath -Algorithm SHA256
          $hashPath = "$assetPath.sha256"
          Set-Content -LiteralPath $hashPath -Value "$($hash.Hash)  Mumble-Friend-Build.msi"

          $notesPath = Join-Path $releaseDir "release-notes.md"
          $shortSha = "${{ github.sha }}".Substring(0, 12)
          Set-Content -LiteralPath $notesPath -Value @"
          # Mumble Friend Build

          This is the latest unsigned shared/WebEngine MSI build for trusted friend testing.

          - Commit: ${{ github.sha }}
          - Branch/ref: ${{ github.ref_name }}
          - Installer: Mumble-Friend-Build.msi
          - SHA256: $($hash.Hash)

          Windows may show a SmartScreen warning because this is not an official signed public release.
          "@

          "asset_path=$assetPath" >> $env:GITHUB_OUTPUT
          "hash_path=$hashPath" >> $env:GITHUB_OUTPUT
          "notes_path=$notesPath" >> $env:GITHUB_OUTPUT
          "short_sha=$shortSha" >> $env:GITHUB_OUTPUT

      - name: Replace friend build release
        shell: powershell
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $ErrorActionPreference = "Stop"

          $tag = $env:FRIEND_RELEASE_TAG
          $protectedTag = $env:PROTECTED_BUILD_ENV_RELEASE_TAG
          if ([string]::IsNullOrWhiteSpace($tag)) {
            throw "FRIEND_RELEASE_TAG is empty."
          }
          if ($tag -eq $protectedTag -or $tag -like "build-env-*") {
            throw "Refusing to publish a friend build over protected build environment tag '$protectedTag'."
          }

          $releaseRows = gh release list --repo $env:GITHUB_REPOSITORY --limit 100 --json tagName | ConvertFrom-Json
          foreach ($releaseRow in $releaseRows) {
            $releaseTag = [string]$releaseRow.tagName
            if ($releaseTag -eq $protectedTag -or $releaseTag -like "build-env-*") {
              Write-Host "Preserving protected release '$releaseTag'."
              continue
            }
            if ($releaseTag -eq $tag -or $releaseTag -like "$tag-*") {
              Write-Host "Deleting previous friend build release '$releaseTag'."
              gh release delete $releaseTag --repo $env:GITHUB_REPOSITORY --cleanup-tag --yes
            }
          }

          git fetch --tags --force origin
          $remoteTag = git ls-remote --tags origin "refs/tags/$tag"
          if ($remoteTag) {
            Write-Host "Deleting stale remote tag '$tag'."
            git push origin ":refs/tags/$tag"
          }

          gh release create $tag `
            "${{ steps.prepare-assets.outputs.asset_path }}" `
            "${{ steps.prepare-assets.outputs.hash_path }}" `
            --repo $env:GITHUB_REPOSITORY `
            --target $env:GITHUB_SHA `
            --title $env:FRIEND_RELEASE_TITLE `
            --notes-file "${{ steps.prepare-assets.outputs.notes_path }}"

      - name: Publish friend MSI workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: Mumble-friend-msi
          compression-level: 0
          path: |
            build-shared-webengine/friend-release/Mumble-Friend-Build.msi
            build-shared-webengine/friend-release/Mumble-Friend-Build.msi.sha256
            build-shared-webengine/friend-release/release-notes.md
            build-shared-webengine/friend-msi-artifacts.txt

      - if: ${{ steps.restore-shared-build-env-cache.outputs.cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: '${{ env.MUMBLE_ENVIRONMENT_DIR }}'
          key: ${{ env.MUMBLE_ENVIRONMENT_VERSION }}

      - if: ${{ steps.setup-windows-optional-runtimes.outputs.onnxruntime-cache-hit != 'true' }}
        uses: actions/cache/save@v5
        with:
          path: .cache/onnxruntime/win-x64-${{ env.ONNXRUNTIME_VERSION }}
          key: onnxruntime-${{ runner.os }}-x64-${{ env.ONNXRUNTIME_VERSION }}
