name: 'Setup Windows Optional Runtimes'
description: 'Restore and install optional Windows runtime dependencies used by CI builds.'
author: 'Mumble Developers'

inputs:
  onnxruntime-version:
    description: 'ONNX Runtime version to restore or download.'
    required: true
  install-rust:
    description: 'Install the Rust toolchain for DeepFilterNet.'
    required: false
    default: 'true'
  install-ffmpeg:
    description: 'Install ffmpeg and ffplay for screen-share helper runtime checks.'
    required: false
    default: 'false'

outputs:
  onnxruntime-cache-hit:
    description: 'Whether the ONNX Runtime cache was restored.'
    value: ${{ steps.restore-onnxruntime-cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - id: restore-onnxruntime-cache
      uses: actions/cache/restore@v5
      with:
        path: .cache/onnxruntime/win-x64-${{ inputs.onnxruntime-version }}
        key: onnxruntime-${{ runner.os }}-x64-${{ inputs.onnxruntime-version }}

    - name: Download ONNX Runtime for DTLN
      shell: powershell
      run: |
        $version = "${{ inputs.onnxruntime-version }}"
        $cacheRoot = Join-Path $env:GITHUB_WORKSPACE ".cache\onnxruntime\win-x64-$version"
        $archive = Join-Path $env:RUNNER_TEMP "onnxruntime-win-x64-$version.zip"
        $onnxRoot = Join-Path $cacheRoot "onnxruntime-win-x64-$version"
        if (-not (Test-Path -LiteralPath (Join-Path $onnxRoot "include"))) {
          if (Test-Path -LiteralPath $cacheRoot) {
            Remove-Item -LiteralPath $cacheRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $cacheRoot | Out-Null
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip" -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $cacheRoot -Force
        }
        if (-not (Test-Path -LiteralPath (Join-Path $onnxRoot "include"))) {
          throw "Expanded ONNX Runtime archive is missing its include directory"
        }
        "ONNXRUNTIME_ROOT=$onnxRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Rust toolchain for DeepFilterNet
      if: ${{ inputs.install-rust == 'true' }}
      shell: powershell
      run: |
        $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
        Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
        & $rustupInit -y --profile minimal --default-toolchain stable
        if ($LASTEXITCODE -ne 0) {
          throw "rustup-init failed"
        }
        "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version

    - name: Install ffmpeg for helper runtime probe
      if: ${{ inputs.install-ffmpeg == 'true' }}
      shell: powershell
      run: |
        choco install ffmpeg -y --no-progress

        $ffmpeg = Get-Command ffmpeg.exe -ErrorAction SilentlyContinue
        if (-not $ffmpeg) {
          $ffmpeg = Get-ChildItem -Path "C:\ProgramData\chocolatey" -Recurse -File -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue |
            Sort-Object -Property FullName |
            Select-Object -First 1
        }
        if (-not $ffmpeg) {
          throw "Unable to locate ffmpeg.exe after Chocolatey installation."
        }

        $ffmpegPath = if ($ffmpeg -is [System.Management.Automation.CommandInfo]) { $ffmpeg.Source } else { $ffmpeg.FullName }
        $ffmpegBin = Split-Path -Parent $ffmpegPath
        $ffplayPath = Join-Path $ffmpegBin "ffplay.exe"
        if (-not (Test-Path -LiteralPath $ffplayPath)) {
          throw "Unable to locate ffplay.exe next to '$ffmpegPath'."
        }

        "MUMBLE_SCREENSHARE_FFMPEG_PATH=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "MUMBLE_SCREENSHARE_FFPLAY_PATH=$ffplayPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        $ffmpegBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
