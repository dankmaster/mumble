name: 'Setup Windows Optional Runtimes'
description: 'Restore and install optional Windows runtime and toolchain dependencies used by CI builds.'
author: 'Mumble Developers'

inputs:
  onnxruntime-version:
    description: 'ONNX Runtime version to restore or download.'
    required: true
  install-rust:
    description: 'Install the Rust toolchain for DeepFilterNet.'
    required: false
    default: 'true'
  install-ffmpeg:
    description: 'Install ffmpeg and ffplay for screen-share helper runtime checks.'
    required: false
    default: 'false'

outputs:
  onnxruntime-cache-hit:
    description: 'Whether the ONNX Runtime cache was restored.'
    value: ${{ steps.restore-onnxruntime-cache.outputs.cache-hit }}

runs:
  using: "composite"
  steps:
    - name: Install vcvars-bash for MSVC setup
      shell: bash
      run: |
        set -euo pipefail
        if [[ ! -f "C:/vcvars-bash/vcvarsall.sh" ]]; then
          rm -rf "C:/vcvars-bash"
          git -c protocol.version=2 -c http.version=HTTP/1.1 clone --depth 1 \
            https://github.com/nathan818fr/vcvars-bash.git "C:/vcvars-bash"
        fi

    - name: Install Windows optional SDKs
      shell: powershell
      run: |
        $ErrorActionPreference = "Stop"

        function Copy-DirectoryContents {
          param(
            [Parameter(Mandatory = $true)]
            [string]$Source,

            [Parameter(Mandatory = $true)]
            [string]$Destination
          )

          if (Test-Path -LiteralPath $Destination) {
            Remove-Item -LiteralPath $Destination -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $Destination | Out-Null
          Get-ChildItem -LiteralPath $Source -Force |
            Copy-Item -Destination $Destination -Recurse -Force
        }

        $thirdPartyRoot = Join-Path $env:GITHUB_WORKSPACE "3rdparty"
        New-Item -ItemType Directory -Force -Path $thirdPartyRoot | Out-Null

        $asioRoot = Join-Path $thirdPartyRoot "asio"
        $asioHeader = Join-Path $asioRoot "common\asio.h"
        if (-not (Test-Path -LiteralPath $asioHeader)) {
          $asioArchive = Join-Path $env:RUNNER_TEMP "asio_sdk.zip"
          $asioExtractRoot = Join-Path $env:RUNNER_TEMP "asio_sdk"
          Remove-Item -LiteralPath $asioExtractRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $asioExtractRoot | Out-Null
          Invoke-WebRequest -Uri "https://dl.mumble.info/build/extra/asio_sdk.zip" -OutFile $asioArchive
          Expand-Archive -LiteralPath $asioArchive -DestinationPath $asioExtractRoot -Force

          $asioHeaderSource = Get-ChildItem -LiteralPath $asioExtractRoot -Recurse -File -Filter "asio.h" |
            Where-Object { $_.FullName -match "\\common\\asio\.h$" } |
            Select-Object -First 1
          if (-not $asioHeaderSource) {
            throw "Downloaded ASIO SDK did not contain common\asio.h."
          }

          $asioSourceRoot = Split-Path -Parent $asioHeaderSource.Directory.FullName
          Copy-DirectoryContents -Source $asioSourceRoot -Destination $asioRoot
        }

        $g15Root = Join-Path $thirdPartyRoot "g15"
        $g15Lib = Join-Path $g15Root "Lib\x64\lglcd.lib"
        if (-not (Test-Path -LiteralPath $g15Lib)) {
          $g15Archive = Join-Path $env:RUNNER_TEMP "g15_sdk.zip"
          $g15ExtractRoot = Join-Path $env:RUNNER_TEMP "g15_sdk"
          Remove-Item -LiteralPath $g15ExtractRoot -Recurse -Force -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path $g15ExtractRoot | Out-Null
          Invoke-WebRequest -Uri "https://dl.mumble.info/build/extra/g15_sdk.zip" -OutFile $g15Archive
          Expand-Archive -LiteralPath $g15Archive -DestinationPath $g15ExtractRoot -Force

          $g15SourceRoot = Get-ChildItem -LiteralPath $g15ExtractRoot -Recurse -Directory -Filter "LCDSDK" |
            Select-Object -First 1
          if (-not $g15SourceRoot) {
            throw "Downloaded G15 SDK did not contain LCDSDK."
          }

          Copy-DirectoryContents -Source $g15SourceRoot.FullName -Destination $g15Root
        }

    - id: restore-onnxruntime-cache
      uses: actions/cache/restore@v5
      with:
        path: .cache/onnxruntime/win-x64-${{ inputs.onnxruntime-version }}
        key: onnxruntime-${{ runner.os }}-x64-${{ inputs.onnxruntime-version }}

    - name: Download ONNX Runtime for DTLN
      shell: powershell
      run: |
        $version = "${{ inputs.onnxruntime-version }}"
        $cacheRoot = Join-Path $env:GITHUB_WORKSPACE ".cache\onnxruntime\win-x64-$version"
        $archive = Join-Path $env:RUNNER_TEMP "onnxruntime-win-x64-$version.zip"
        $onnxRoot = Join-Path $cacheRoot "onnxruntime-win-x64-$version"
        if (-not (Test-Path -LiteralPath (Join-Path $onnxRoot "include"))) {
          if (Test-Path -LiteralPath $cacheRoot) {
            Remove-Item -LiteralPath $cacheRoot -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $cacheRoot | Out-Null
          Invoke-WebRequest -Uri "https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip" -OutFile $archive
          Expand-Archive -LiteralPath $archive -DestinationPath $cacheRoot -Force
        }
        if (-not (Test-Path -LiteralPath (Join-Path $onnxRoot "include"))) {
          throw "Expanded ONNX Runtime archive is missing its include directory"
        }
        "ONNXRUNTIME_ROOT=$onnxRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Install Rust toolchain for DeepFilterNet
      if: ${{ inputs.install-rust == 'true' }}
      shell: powershell
      run: |
        $rustupInit = Join-Path $env:RUNNER_TEMP "rustup-init.exe"
        Invoke-WebRequest -Uri "https://win.rustup.rs/x86_64" -OutFile $rustupInit
        & $rustupInit -y --profile minimal --default-toolchain stable
        if ($LASTEXITCODE -ne 0) {
          throw "rustup-init failed"
        }
        "$env:USERPROFILE\.cargo\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
        & "$env:USERPROFILE\.cargo\bin\cargo.exe" --version

    - name: Install ffmpeg for helper runtime probe
      if: ${{ inputs.install-ffmpeg == 'true' }}
      shell: powershell
      run: |
        choco install ffmpeg -y --no-progress

        $chocolateyRoot = if (-not [string]::IsNullOrWhiteSpace($env:ChocolateyInstall)) {
          $env:ChocolateyInstall
        } else {
          "C:\ProgramData\chocolatey"
        }
        $ffmpeg = Get-ChildItem -Path (Join-Path $chocolateyRoot "lib\ffmpeg") -Recurse -File -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue |
          Sort-Object -Property @{ Expression = { if ($_.FullName -match "\\tools\\.*\\bin\\ffmpeg\.exe$") { 0 } else { 1 } } }, FullName |
          Select-Object -First 1
        if (-not $ffmpeg) {
          $ffmpeg = Get-Command ffmpeg.exe -ErrorAction SilentlyContinue
        }
        if (-not $ffmpeg) {
          $ffmpeg = Get-ChildItem -Path $chocolateyRoot -Recurse -File -Filter "ffmpeg.exe" -ErrorAction SilentlyContinue |
            Sort-Object -Property FullName |
            Select-Object -First 1
        }
        if (-not $ffmpeg) {
          throw "Unable to locate ffmpeg.exe after Chocolatey installation."
        }

        $ffmpegPath = if ($ffmpeg -is [System.Management.Automation.CommandInfo]) { $ffmpeg.Source } else { $ffmpeg.FullName }
        $ffmpegBin = Split-Path -Parent $ffmpegPath
        $ffplayPath = Join-Path $ffmpegBin "ffplay.exe"
        if (-not (Test-Path -LiteralPath $ffplayPath)) {
          throw "Unable to locate ffplay.exe next to '$ffmpegPath'."
        }

        "MUMBLE_SCREENSHARE_FFMPEG_PATH=$ffmpegPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        "MUMBLE_SCREENSHARE_FFPLAY_PATH=$ffplayPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        $ffmpegBin | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
